<svg width="280" height="60" viewBox="0 0 280 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d68910;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with subtle glow -->
  <circle cx="30" cy="30" r="25" fill="#1a1f35"/>
  <circle cx="30" cy="30" r="25" fill="url(#goldGradient)" opacity="0.1"/>
  
  <!-- Stylized "S" and "B" initials forming a power symbol -->
  <g transform="translate(30, 30)">
    <!-- Outer ring segments -->
    <path d="M 0,-15 A 15,15 0 0,1 10.6,-10.6" stroke="url(#goldGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 10.6,10.6 A 15,15 0 0,1 0,15" stroke="url(#goldGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M -10.6,-10.6 A 15,15 0 0,0 -15,0" stroke="url(#goldGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 15,0 A 15,15 0 0,1 10.6,10.6" stroke="url(#goldGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Lightning bolt in center -->
    <path d="M 2,-8 L -3,1 L 1,1 L -4,10 L 5,0 L 0,0 L 3,-8 Z" fill="url(#goldGradient)"/>
  </g>
  
  <!-- Text -->
  <text x="65" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">SOCAL</text>
  <text x="65" y="42" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#f39c12">BRADLEY ELECTRIC</text>
</svg>

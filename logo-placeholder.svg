<svg width="280" height="60" viewBox="0 0 280 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Circuit pattern background -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d68910;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="30" cy="30" r="25" fill="#1a1f35"/>
  
  <!-- Lightning bolt icon -->
  <path d="M35 15 L25 30 L30 30 L25 45 L35 30 L30 30 Z" fill="url(#goldGradient)"/>
  
  <!-- Text -->
  <text x="65" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">SOCAL</text>
  <text x="65" y="42" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#f39c12">BRADLEY ELECTRIC</text>
  
  <!-- Circuit decoration -->
  <circle cx="55" cy="15" r="2" fill="#f39c12" opacity="0.5"/>
  <line x1="55" y1="15" x2="55" y2="10" stroke="#f39c12" stroke-width="1" opacity="0.5"/>
  <circle cx="55" cy="10" r="1" fill="#f39c12" opacity="0.5"/>
</svg>
